<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: white;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .frame-container {
      width: 320px;
      height: 445px;
      overflow: hidden;
      position: relative;
      background: #000;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      transform: scale(2.09);
      transform-origin: center;
    }

    iframe {
      width: 392px;
      height: 620px;
      border: 0;
      position: absolute;
      top: 0px;
      left: -36px;
    }
  </style>
</head>
<body>
  <div class="frame-container">
    <iframe src="https://studio.code.org/projects/applab/868d7dd8-d1ba-4eca-ba6e-ffb60b09f2f9/embed"></iframe>
  </div>
</body>
</html>
